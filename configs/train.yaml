project:
  name: iris-segmentation
  output_dir: runs/iris-segformer

data:
  root_dir: dataset
  image_dir: images
  mask_dir: masks
  image_ext: .tiff
  mask_ext: .tiff
  train_split: 0.8
  input_size: [512, 512]
  num_workers: 0
  pin_memory: false

model:
  backbone_name: nvidia/segformer-b1-finetuned-ade-512-512
  num_classes: 1
  decoder_channels: 256
  dropout: 0.1

training:
  seed: 42
  device: cuda
  epochs: 2
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.00001
  amp: true
  grad_clip_norm: 1.0
  save_every: 1

loss:
  dice_weight: 0.6
  focal_weight: 0.4
  focal_alpha: 0.8
  focal_gamma: 2.0

logging:
  log_interval: 10
  metric_to_monitor: val_dice
  monitor_mode: max
